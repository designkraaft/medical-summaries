<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مؤقت الإنجاز القرائي الدقيق</title>
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --bg: #f8fafc;
            --text: #1e293b;
            --card-bg: #ffffff;
            --border: #e2e8f0;
        }

        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            background-color: var(--card-bg);
            padding: 2rem;
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            text-align: center;
            width: 100%;
            max-width: 400px;
            position: relative;
        }

        .settings-btn-top {
            position: absolute;
            top: 15px;
            right: 15px;
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: #64748b;
        }

        .timer-display {
            font-size: 5rem;
            font-weight: bold;
            margin: 2rem 0;
            color: var(--primary);
            font-variant-numeric: tabular-nums;
            direction: ltr;
        }

        .controls {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        button {
            padding: 12px 24px;
            font-size: 1rem;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        button:disabled { opacity: 0.5; cursor: not-allowed; }

        .btn-main { background-color: var(--primary); color: white; }
        .btn-main:hover:not(:disabled) { background-color: var(--primary-hover); }
        
        .btn-secondary { background-color: #e2e8f0; color: #475569; }
        .btn-secondary:hover:not(:disabled) { background-color: #cbd5e1; }

        .btn-danger { background-color: #ef4444; color: white; }
        .btn-danger:hover:not(:disabled) { background-color: #dc2626; }

        .btn-small { padding: 6px 12px; font-size: 0.85rem; margin: 2px; }

        /* Modals */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(0, 0, 0, 0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 15px;
        }

        .modal-content {
            background-color: var(--card-bg);
            padding: 2rem 1.5rem;
            border-radius: 16px;
            width: 100%;
            max-width: 550px;
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
        }

        .modal h3 { margin-top: 0; }

        .form-group {
            margin-bottom: 15px;
            text-align: right;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-size: 0.9rem;
            font-weight: 600;
        }

        input[type="number"], input[type="text"], select {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 1rem;
        }

        /* Tabs System */
        .tabs {
            display: flex;
            border-bottom: 2px solid var(--border);
            margin-bottom: 20px;
            margin-top: 30px;
        }

        .tab-btn {
            flex: 1;
            background: none;
            border: none;
            padding: 10px 5px;
            font-size: 0.95rem;
            color: #64748b;
            border-bottom: 3px solid transparent;
            margin-bottom: -2px;
            border-radius: 0;
        }

        .tab-btn.active {
            color: var(--primary);
            border-bottom-color: var(--primary);
        }

        .tab-content { display: none; animation: fadeIn 0.3s ease; }
        .tab-content.active { display: block; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Table */
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
            white-space: nowrap;
        }
        
        th, td {
            border: 1px solid var(--border);
            padding: 8px;
            text-align: center;
        }
        
        th { background-color: var(--bg); position: sticky; top: 0; z-index: 1; }

        .table-container {
            max-height: 350px;
            overflow-x: auto;
            overflow-y: auto;
            border: 1px solid var(--border);
            border-radius: 8px;
        }

        .close-modal {
            background: none;
            border: none;
            color: #ef4444;
            font-size: 1.5rem;
            cursor: pointer;
            position: absolute;
            top: 15px;
            left: 15px;
            padding: 0;
            line-height: 1;
        }

        /* Update Zone */
        .update-zone {
            margin-top: 25px;
            padding: 15px;
            background-color: #f0fdf4;
            border: 1px solid #bbf7d0;
            border-radius: 8px;
        }
        .update-zone h4 { margin: 0 0 10px 0; color: #166534; }
        .update-zone p { font-size: 0.85rem; color: #15803d; margin-bottom: 15px; }
        .btn-update { background-color: #16a34a; color: white; }
        .btn-update:hover { background-color: #15803d; }

        .tag-manual {
            font-size: 0.7rem;
            background-color: #f1f5f9;
            color: #475569;
            padding: 2px 4px;
            border-radius: 4px;
            display: block;
            margin-top: 3px;
        }
        
        .action-btns {
            display: flex;
            gap: 5px;
            justify-content: center;
        }
    </style>
</head>
<body>

    <!-- Main Screen -->
    <div class="container">
        <button class="settings-btn-top" id="openSettingsBtn" title="القائمة">⚙️</button>
        <div class="timer-display" id="timeDisplay">10:00</div>
        
        <div class="controls">
            <button id="startBtn" class="btn-main">بدء</button>
            <button id="pauseBtn" class="btn-secondary" disabled>إيقاف مؤقت</button>
            <button id="stopBtn" class="btn-danger" disabled>إنهاء</button>
        </div>
    </div>

    <!-- End Round Modal (Automatic) -->
    <div id="endModal" class="modal">
        <div class="modal-content" style="max-width: 400px;">
            <h3 style="text-align: center;">انتهت الجولة! 👏</h3>
            
            <div class="form-group">
                <label>نوع القراءة:</label>
                <select id="autoReadType">
                    <option value="قراءة بتركيز">قراءة بتركيز</option>
                    <option value="قراءة سريعة">قراءة سريعة</option>
                </select>
            </div>

            <div class="form-group">
                <label>المادة / الموضوع:</label>
                <input type="text" id="autoSubject" placeholder="مثال: علم التشريح، فيزيولوجيا...">
            </div>

            <div class="form-group">
                <label>عدد الصفحات:</label>
                <input type="number" id="autoPages" min="0" placeholder="أدخل عدد الصفحات...">
            </div>
            
            <button id="saveAutoRoundBtn" class="btn-main" style="width: 100%;">حفظ السجل</button>
        </div>
    </div>

    <!-- Edit Record Modal -->
    <div id="editModal" class="modal" style="z-index: 1050;">
        <div class="modal-content" style="max-width: 400px;">
            <button class="close-modal" id="closeEditBtn" title="إغلاق">✖</button>
            <h3>تعديل الجولة</h3>
            <input type="hidden" id="editRecordId">
            
            <div class="form-group">
                <label>نوع القراءة:</label>
                <select id="editReadType">
                    <option value="قراءة بتركيز">قراءة بتركيز</option>
                    <option value="قراءة سريعة">قراءة سريعة</option>
                </select>
            </div>

            <div class="form-group">
                <label>المادة / الموضوع:</label>
                <input type="text" id="editSubject">
            </div>

            <div class="form-group">
                <label>عدد الصفحات:</label>
                <input type="number" id="editPages" min="0">
            </div>
            
            <button id="saveEditBtn" class="btn-main" style="width: 100%;">حفظ التعديلات</button>
        </div>
    </div>

    <!-- Settings & History Modal (With Tabs) -->
    <div id="settingsModal" class="modal">
        <div class="modal-content">
            <button class="close-modal" id="closeSettingsBtn" title="إغلاق">✖</button>
            
            <div class="tabs">
                <button class="tab-btn active" data-tab="tab-history">السجل</button>
                <button class="tab-btn" data-tab="tab-manual">إضافة يدوية</button>
                <button class="tab-btn" data-tab="tab-settings">الضبط</button>
            </div>

            <!-- Tab 1: History -->
            <div id="tab-history" class="tab-content active">
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>الجولة</th>
                                <th>التاريخ</th>
                                <th>المادة</th>
                                <th>النوع</th>
                                <th>الصفحات</th>
                                <th>إجراءات</th>
                            </tr>
                        </thead>
                        <tbody id="historyTableBody">
                            <!-- Data will be injected here -->
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- Tab 2: Manual Add -->
            <div id="tab-manual" class="tab-content">
                <div class="form-group">
                    <label>نوع القراءة:</label>
                    <select id="manualReadType">
                        <option value="قراءة بتركيز">قراءة بتركيز</option>
                        <option value="قراءة سريعة">قراءة سريعة</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>المادة / الموضوع:</label>
                    <input type="text" id="manualSubject" placeholder="مثال: علم التشريح، مراجعة...">
                </div>

                <div class="form-group">
                    <label>عدد الصفحات المنجزة:</label>
                    <input type="number" id="manualPages" min="0" placeholder="مثال: 5">
                </div>

                <button id="saveManualBtn" class="btn-main" style="width: 100%;">إضافة إلى السجل</button>
            </div>

            <!-- Tab 3: Settings -->
            <div id="tab-settings" class="tab-content">
                <div class="form-group">
                    <label>مدة الجولة الافتراضية (بالدقائق):</label>
                    <input type="number" id="durationInput" min="1" value="10" style="text-align: center;">
                </div>
                
                <div class="update-zone">
                    <h4>تحديث الإصدار</h4>
                    <p>انقر هنا لتحديث الصفحة وسحب أحدث إصدار من المؤقت (السجل آمن).</p>
                    <button id="updateAppBtn" class="btn-update" style="width: 100%;">تحديث الآن</button>
                </div>
            </div>

        </div>
    </div>

    <script>
        // DOM Elements
        const timeDisplay = document.getElementById('timeDisplay');
        const startBtn = document.getElementById('startBtn');
        const pauseBtn = document.getElementById('pauseBtn');
        const stopBtn = document.getElementById('stopBtn');
        
        const endModal = document.getElementById('endModal');
        const settingsModal = document.getElementById('settingsModal');
        const editModal = document.getElementById('editModal');
        
        const autoPages = document.getElementById('autoPages');
        const autoSubject = document.getElementById('autoSubject');
        const autoReadType = document.getElementById('autoReadType');
        const saveAutoRoundBtn = document.getElementById('saveAutoRoundBtn');

        const manualPages = document.getElementById('manualPages');
        const manualSubject = document.getElementById('manualSubject');
        const manualReadType = document.getElementById('manualReadType');
        const saveManualBtn = document.getElementById('saveManualBtn');

        const editRecordId = document.getElementById('editRecordId');
        const editPages = document.getElementById('editPages');
        const editSubject = document.getElementById('editSubject');
        const editReadType = document.getElementById('editReadType');
        const saveEditBtn = document.getElementById('saveEditBtn');
        const closeEditBtn = document.getElementById('closeEditBtn');

        const openSettingsBtn = document.getElementById('openSettingsBtn');
        const closeSettingsBtn = document.getElementById('closeSettingsBtn');
        const durationInput = document.getElementById('durationInput');
        const historyTableBody = document.getElementById('historyTableBody');
        const updateAppBtn = document.getElementById('updateAppBtn');

        // Tabs Logic
        const tabBtns = document.querySelectorAll('.tab-btn');
        const tabContents = document.querySelectorAll('.tab-content');

        tabBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                tabBtns.forEach(b => b.classList.remove('active'));
                tabContents.forEach(c => c.classList.remove('active'));
                btn.classList.add('active');
                document.getElementById(btn.dataset.tab).classList.add('active');
            });
        });

        // Variables
        let timerInterval;
        let defaultDurationSeconds = 10 * 60;
        let timeLeft = defaultDurationSeconds;
        let isRunning = false;
        let isPaused = false;
        let endTime = 0; 
        let lastBeepedSecond = -1;
        
        let roundCounter = 1;
        let historyData = [];

        // Audio System
        let audioCtx;
        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }
        function playBeep(frequency, duration) {
            if (!audioCtx) return;
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            oscillator.type = 'sine';
            oscillator.frequency.value = frequency;
            gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            oscillator.start();
            oscillator.stop(audioCtx.currentTime + duration);
        }

        // Storage Management
        function saveData() {
            const state = { timeLeft, isRunning, isPaused, endTime, defaultDurationSeconds, roundCounter };
            localStorage.setItem('studyTimerState', JSON.stringify(state));
            localStorage.setItem('studyTimerHistory', JSON.stringify(historyData));
        }

        function loadData() {
            const savedHistory = localStorage.getItem('studyTimerHistory');
            if (savedHistory) {
                historyData = JSON.parse(savedHistory);
                
                // ترقيع هام: إعطاء ID للسجلات القديمة التي تم حفظها قبل هذا التحديث
                historyData.forEach((item, index) => {
                    if (!item.id) {
                        item.id = Date.now() + index; 
                    }
                });
                
                updateHistoryTable();
            }

            const savedState = localStorage.getItem('studyTimerState');
            if (savedState) {
                const state = JSON.parse(savedState);
                defaultDurationSeconds = state.defaultDurationSeconds || (10 * 60);
                durationInput.value = defaultDurationSeconds / 60;
                roundCounter = state.roundCounter || 1;
                
                if (state.isRunning) {
                    const now = Date.now();
                    timeLeft = Math.max(0, Math.round((state.endTime - now) / 1000));
                    endTime = state.endTime;
                    if (timeLeft > 0) startTimer(true);
                    else { timeLeft = 0; updateDisplay(); showEndModal(); }
                } else if (state.isPaused) {
                    timeLeft = state.timeLeft;
                    isPaused = true;
                    updateDisplay();
                    startBtn.textContent = "استئناف";
                    startBtn.disabled = false;
                    pauseBtn.disabled = true;
                    stopBtn.disabled = false;
                } else {
                    timeLeft = defaultDurationSeconds;
                    updateDisplay();
                }
            } else updateDisplay();
        }

        // Timer Logic
        function updateDisplay() {
            const minutes = Math.floor(timeLeft / 60);
            const seconds = timeLeft % 60;
            timeDisplay.textContent = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
        }

        function tick() {
            if (!isRunning) return;
            const now = Date.now();
            timeLeft = Math.max(0, Math.round((endTime - now) / 1000));
            updateDisplay();

            if (timeLeft <= 10 && timeLeft > 0 && lastBeepedSecond !== timeLeft) {
                playBeep(600, 0.1);
                lastBeepedSecond = timeLeft;
            }

            if (timeLeft <= 0) {
                clearInterval(timerInterval);
                playBeep(800, 0.8);
                showEndModal();
                resetTimerUI();
            }
            saveData();
        }

        function startTimer(isResuming = false) {
            initAudio();
            if (!isResuming) endTime = Date.now() + (timeLeft * 1000);
            isRunning = true;
            isPaused = false;
            lastBeepedSecond = -1;
            
            startBtn.textContent = "بدء";
            startBtn.disabled = true;
            pauseBtn.disabled = false;
            stopBtn.disabled = false;

            clearInterval(timerInterval);
            timerInterval = setInterval(tick, 500);
            saveData();
        }

        function pauseTimer() {
            clearInterval(timerInterval);
            isRunning = false;
            isPaused = true;
            startBtn.textContent = "استئناف";
            startBtn.disabled = false;
            pauseBtn.disabled = true;
            saveData();
        }

        function stopTimer() {
            clearInterval(timerInterval);
            resetTimerUI();
            timeLeft = defaultDurationSeconds;
            updateDisplay();
            saveData();
        }

        function resetTimerUI() {
            isRunning = false;
            isPaused = false;
            startBtn.textContent = "بدء";
            startBtn.disabled = false;
            pauseBtn.disabled = true;
            stopBtn.disabled = true;
        }

        function getCurrentDateTimeString() {
            const now = new Date();
            const timeString = `${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}`;
            const dateString = `${now.getFullYear()}/${(now.getMonth()+1).toString().padStart(2, '0')}/${now.getDate().toString().padStart(2, '0')}`;
            return `${dateString} ${timeString}`;
        }

        // Data Operations
        function addRecord(pages, subject, readType, note = '') {
            historyData.push({
                id: Date.now(),
                round: roundCounter,
                date: getCurrentDateTimeString(),
                pages: pages,
                subject: subject || 'غير محدد',
                readType: readType,
                note: note
            });
            roundCounter++;
            updateHistoryTable();
            saveData();
        }

        window.deleteRecord = function(id) {
            if(confirm("هل أنت متأكد من حذف هذه الجولة؟")) {
                // التحويل إلى نصوص لضمان المطابقة
                historyData = historyData.filter(item => String(item.id) !== String(id));
                updateHistoryTable();
                saveData();
            }
        }

        window.openEditModal = function(id) {
            // التحويل إلى نصوص لضمان المطابقة
            const record = historyData.find(item => String(item.id) === String(id));
            if(record) {
                editRecordId.value = record.id;
                editPages.value = record.pages;
                editSubject.value = record.subject !== 'غير محدد' ? record.subject : '';
                editReadType.value = record.readType || 'قراءة بتركيز';
                editModal.style.display = 'flex';
            } else {
                alert("لم يتم العثور على الجولة!");
            }
        }

        // إصلاح زر حفظ التعديلات
        saveEditBtn.addEventListener('click', () => {
            const idStr = editRecordId.value;
            const pgs = editPages.value;
            
            if (pgs === "" || pgs < 0) { 
                alert("الرجاء إدخال عدد صفحات صحيح."); 
                return; 
            }

            const index = historyData.findIndex(item => String(item.id) === String(idStr));
            
            if (index !== -1) {
                historyData[index].pages = pgs;
                historyData[index].subject = editSubject.value || 'غير محدد';
                historyData[index].readType = editReadType.value;
                updateHistoryTable();
                saveData();
                editModal.style.display = 'none'; // إخفاء النافذة بعد الحفظ بنجاح
            } else {
                alert("حدث خطأ: لم نتمكن من حفظ التعديل، قد تكون الجولة محذوفة.");
            }
        });

        closeEditBtn.addEventListener('click', () => editModal.style.display = 'none');

        // Modals & Events
        function showEndModal() {
            endModal.style.display = 'flex';
            autoPages.value = '';
            autoPages.focus();
        }

        saveAutoRoundBtn.addEventListener('click', () => {
            initAudio();
            const pgs = autoPages.value;
            if (pgs === "" || pgs < 0) { alert("الرجاء إدخال عدد صفحات صحيح."); return; }

            addRecord(pgs, autoSubject.value, autoReadType.value);
            
            manualSubject.value = autoSubject.value;
            manualReadType.value = autoReadType.value;

            endModal.style.display = 'none';
            timeLeft = defaultDurationSeconds;
            updateDisplay();
            saveData();
        });

        saveManualBtn.addEventListener('click', () => {
            const pgs = manualPages.value;
            if (pgs === "" || pgs < 0) { alert("الرجاء إدخال عدد صفحات صحيح."); return; }

            addRecord(pgs, manualSubject.value, manualReadType.value, 'يدوي');
            
            autoSubject.value = manualSubject.value;
            autoReadType.value = manualReadType.value;
            
            manualPages.value = '';
            document.querySelector('[data-tab="tab-history"]').click();
        });

        function updateHistoryTable() {
            historyTableBody.innerHTML = '';
            historyData.slice().reverse().forEach(entry => {
                const noteHtml = entry.note ? `<span class="tag-manual">${entry.note}</span>` : '';
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${entry.round}</td>
                    <td dir="ltr" style="font-size:0.75rem;">${entry.date}</td>
                    <td>${entry.subject} ${noteHtml}</td>
                    <td>${entry.readType || '-'}</td>
                    <td>${entry.pages}</td>
                    <td class="action-btns">
                        <button class="btn-secondary btn-small" onclick="openEditModal('${entry.id}')">✏️</button>
                        <button class="btn-danger btn-small" onclick="deleteRecord('${entry.id}')">🗑️</button>
                    </td>
                `;
                historyTableBody.appendChild(row);
            });
        }

        // Base Events
        startBtn.addEventListener('click', () => startTimer(false));
        pauseBtn.addEventListener('click', pauseTimer);
        stopBtn.addEventListener('click', stopTimer);

        openSettingsBtn.addEventListener('click', () => settingsModal.style.display = 'flex');

        closeSettingsBtn.addEventListener('click', () => {
            settingsModal.style.display = 'none';
            const newMins = parseInt(durationInput.value);
            if (newMins > 0 && !isRunning && !isPaused) {
                defaultDurationSeconds = newMins * 60;
                timeLeft = defaultDurationSeconds;
                updateDisplay();
                saveData();
            }
        });

        updateAppBtn.addEventListener('click', () => {
            saveData();
            const url = new URL(window.location.href);
            url.searchParams.set('v', new Date().getTime()); 
            window.location.href = url.toString();
        });

        window.addEventListener('click', (e) => {
            if (e.target === settingsModal) closeSettingsBtn.click();
            if (e.target === editModal) closeEditBtn.click();
        });

        // Initialize on Load
        window.addEventListener('DOMContentLoaded', loadData);
    </script>
</body>
</html>
