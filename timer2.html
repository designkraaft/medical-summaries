<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مؤقت الإنجاز القرائي الدقيق</title>
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --bg: #f8fafc;
            --text: #1e293b;
            --card-bg: #ffffff;
            --border: #e2e8f0;
        }

        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            background-color: var(--card-bg);
            padding: 2rem;
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            text-align: center;
            width: 100%;
            max-width: 400px;
            position: relative;
        }

        .settings-btn-top {
            position: absolute;
            top: 15px;
            right: 15px;
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: #64748b;
        }

        .timer-display {
            font-size: 5rem;
            font-weight: bold;
            margin: 2rem 0;
            color: var(--primary);
            font-variant-numeric: tabular-nums;
            direction: ltr;
        }

        .controls {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        button {
            padding: 12px 24px;
            font-size: 1rem;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-main { background-color: var(--primary); color: white; }
        .btn-main:hover:not(:disabled) { background-color: var(--primary-hover); }
        
        .btn-secondary { background-color: #e2e8f0; color: #475569; }
        .btn-secondary:hover:not(:disabled) { background-color: #cbd5e1; }

        .btn-danger { background-color: #ef4444; color: white; }
        .btn-danger:hover:not(:disabled) { background-color: #dc2626; }

        /* Modals */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(0, 0, 0, 0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 20px;
        }

        .modal-content {
            background-color: var(--card-bg);
            padding: 2rem 1.5rem;
            border-radius: 16px;
            width: 100%;
            max-width: 450px;
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
        }

        .modal h3 { margin-top: 0; }

        input[type="number"] {
            width: 100%;
            padding: 10px;
            margin: 10px 0 20px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 1rem;
            text-align: center;
        }

        /* Tabs System */
        .tabs {
            display: flex;
            border-bottom: 2px solid var(--border);
            margin-bottom: 20px;
            margin-top: 30px;
        }

        .tab-btn {
            flex: 1;
            background: none;
            border: none;
            padding: 10px 5px;
            font-size: 0.95rem;
            color: #64748b;
            border-bottom: 3px solid transparent;
            margin-bottom: -2px;
            border-radius: 0;
        }

        .tab-btn.active {
            color: var(--primary);
            border-bottom-color: var(--primary);
        }

        .tab-content {
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .tab-content.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Table */
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
        }
        
        th, td {
            border: 1px solid var(--border);
            padding: 10px;
            text-align: center;
        }
        
        th { background-color: var(--bg); position: sticky; top: 0; }

        .table-container {
            max-height: 300px;
            overflow-y: auto;
            border: 1px solid var(--border);
            border-radius: 8px;
        }

        .close-modal {
            background: none;
            border: none;
            color: #ef4444;
            font-size: 1.5rem;
            cursor: pointer;
            position: absolute;
            top: 15px;
            left: 15px;
            padding: 0;
            line-height: 1;
        }

        /* Update Zone */
        .update-zone {
            margin-top: 25px;
            padding: 15px;
            background-color: #f0fdf4;
            border: 1px solid #bbf7d0;
            border-radius: 8px;
        }

        .update-zone h4 { margin: 0 0 10px 0; color: #166534; }
        .update-zone p { font-size: 0.85rem; color: #15803d; margin-bottom: 15px; }
        .btn-update { background-color: #16a34a; color: white; }
        .btn-update:hover { background-color: #15803d; }

        .tag-manual {
            font-size: 0.75rem;
            background-color: #f1f5f9;
            color: #475569;
            padding: 2px 6px;
            border-radius: 4px;
            margin-right: 5px;
        }
    </style>
</head>
<body>

    <!-- Main Screen -->
    <div class="container">
        <button class="settings-btn-top" id="openSettingsBtn" title="القائمة">⚙️</button>
        <div class="timer-display" id="timeDisplay">10:00</div>
        
        <div class="controls">
            <button id="startBtn" class="btn-main">بدء</button>
            <button id="pauseBtn" class="btn-secondary" disabled>إيقاف مؤقت</button>
            <button id="stopBtn" class="btn-danger" disabled>إنهاء</button>
        </div>
    </div>

    <!-- End Round Modal -->
    <div id="endModal" class="modal">
        <div class="modal-content">
            <h3 style="text-align: center;">انتهت الجولة! 👏</h3>
            <label>كم صفحة درست خلال هذه الجولة؟</label>
            <input type="number" id="pagesInput" min="0" placeholder="أدخل عدد الصفحات...">
            <button id="saveRoundBtn" class="btn-main" style="width: 100%;">حفظ السجل</button>
        </div>
    </div>

    <!-- Settings & History Modal (With Tabs) -->
    <div id="settingsModal" class="modal">
        <div class="modal-content">
            <button class="close-modal" id="closeSettingsBtn" title="إغلاق">✖</button>
            
            <div class="tabs">
                <button class="tab-btn active" data-tab="tab-history">السجل</button>
                <button class="tab-btn" data-tab="tab-manual">إضافة يدوية</button>
                <button class="tab-btn" data-tab="tab-settings">الضبط</button>
            </div>

            <!-- Tab 1: History -->
            <div id="tab-history" class="tab-content active">
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>الجولة</th>
                                <th>التاريخ والوقت</th>
                                <th>الصفحات</th>
                            </tr>
                        </thead>
                        <tbody id="historyTableBody">
                            <!-- Data will be injected here -->
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- Tab 2: Manual Add -->
            <div id="tab-manual" class="tab-content">
                <label>عدد الصفحات التي قرأتها (في جولة خارجية):</label>
                <input type="number" id="manualPagesInput" min="0" placeholder="مثال: 5">
                <button id="saveManualBtn" class="btn-main" style="width: 100%;">إضافة إلى السجل</button>
            </div>

            <!-- Tab 3: Settings -->
            <div id="tab-settings" class="tab-content">
                <label>مدة الجولة الافتراضية (بالدقائق):</label>
                <input type="number" id="durationInput" min="1" value="10">
                
                <div class="update-zone">
                    <h4>تحديث الإصدار</h4>
                    <p>انقر هنا لتحديث الصفحة وسحب أحدث إصدار من المؤقت (السجل آمن).</p>
                    <button id="updateAppBtn" class="btn-update" style="width: 100%;">تحديث الآن</button>
                </div>
            </div>

        </div>
    </div>

    <script>
        // DOM Elements
        const timeDisplay = document.getElementById('timeDisplay');
        const startBtn = document.getElementById('startBtn');
        const pauseBtn = document.getElementById('pauseBtn');
        const stopBtn = document.getElementById('stopBtn');
        
        const endModal = document.getElementById('endModal');
        const pagesInput = document.getElementById('pagesInput');
        const saveRoundBtn = document.getElementById('saveRoundBtn');
        
        const settingsModal = document.getElementById('settingsModal');
        const openSettingsBtn = document.getElementById('openSettingsBtn');
        const closeSettingsBtn = document.getElementById('closeSettingsBtn');
        
        const durationInput = document.getElementById('durationInput');
        const historyTableBody = document.getElementById('historyTableBody');
        const updateAppBtn = document.getElementById('updateAppBtn');
        
        const manualPagesInput = document.getElementById('manualPagesInput');
        const saveManualBtn = document.getElementById('saveManualBtn');

        // Tabs logic
        const tabBtns = document.querySelectorAll('.tab-btn');
        const tabContents = document.querySelectorAll('.tab-content');

        tabBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                tabBtns.forEach(b => b.classList.remove('active'));
                tabContents.forEach(c => c.classList.remove('active'));
                
                btn.classList.add('active');
                document.getElementById(btn.dataset.tab).classList.add('active');
            });
        });

        // Variables
        let timerInterval;
        let defaultDurationSeconds = 10 * 60;
        let timeLeft = defaultDurationSeconds;
        let isRunning = false;
        let isPaused = false;
        let endTime = 0; 
        let lastBeepedSecond = -1;
        
        let roundCounter = 1;
        let historyData = [];

        // Audio Context
        let audioCtx;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        function playBeep(frequency, duration) {
            if (!audioCtx) return;
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            oscillator.type = 'sine';
            oscillator.frequency.value = frequency;
            
            gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
            
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            oscillator.start();
            oscillator.stop(audioCtx.currentTime + duration);
        }

        // --- Storage Management ---
        function saveData() {
            const state = {
                timeLeft, isRunning, isPaused, endTime, defaultDurationSeconds, roundCounter
            };
            localStorage.setItem('studyTimerState', JSON.stringify(state));
            localStorage.setItem('studyTimerHistory', JSON.stringify(historyData));
        }

        function loadData() {
            const savedHistory = localStorage.getItem('studyTimerHistory');
            if (savedHistory) {
                historyData = JSON.parse(savedHistory);
                updateHistoryTable();
            }

            const savedState = localStorage.getItem('studyTimerState');
            if (savedState) {
                const state = JSON.parse(savedState);
                defaultDurationSeconds = state.defaultDurationSeconds || (10 * 60);
                durationInput.value = defaultDurationSeconds / 60;
                roundCounter = state.roundCounter || 1;
                
                if (state.isRunning) {
                    const now = Date.now();
                    timeLeft = Math.max(0, Math.round((state.endTime - now) / 1000));
                    endTime = state.endTime;
                    
                    if (timeLeft > 0) {
                        startTimer(true);
                    } else {
                        timeLeft = 0;
                        updateDisplay();
                        showEndModal();
                    }
                } else if (state.isPaused) {
                    timeLeft = state.timeLeft;
                    isPaused = true;
                    updateDisplay();
                    startBtn.textContent = "استئناف";
                    startBtn.disabled = false;
                    pauseBtn.disabled = true;
                    stopBtn.disabled = false;
                } else {
                    timeLeft = defaultDurationSeconds;
                    updateDisplay();
                }
            } else {
                updateDisplay();
            }
        }

        // --- Timer Logic ---
        function updateDisplay() {
            const minutes = Math.floor(timeLeft / 60);
            const seconds = timeLeft % 60;
            timeDisplay.textContent = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
        }

        function tick() {
            if (!isRunning) return;
            
            const now = Date.now();
            timeLeft = Math.max(0, Math.round((endTime - now) / 1000));
            updateDisplay();

            if (timeLeft <= 10 && timeLeft > 0 && lastBeepedSecond !== timeLeft) {
                playBeep(600, 0.1);
                lastBeepedSecond = timeLeft;
            }

            if (timeLeft <= 0) {
                clearInterval(timerInterval);
                playBeep(800, 0.8);
                showEndModal();
                resetTimerUI();
            }
            saveData();
        }

        function startTimer(isResuming = false) {
            initAudio();
            
            if (!isResuming) {
                endTime = Date.now() + (timeLeft * 1000);
            }
            
            isRunning = true;
            isPaused = false;
            lastBeepedSecond = -1;
            
            startBtn.textContent = "بدء";
            startBtn.disabled = true;
            pauseBtn.disabled = false;
            stopBtn.disabled = false;

            clearInterval(timerInterval);
            timerInterval = setInterval(tick, 500);
            saveData();
        }

        function pauseTimer() {
            clearInterval(timerInterval);
            isRunning = false;
            isPaused = true;
            
            startBtn.textContent = "استئناف";
            startBtn.disabled = false;
            pauseBtn.disabled = true;
            saveData();
        }

        function stopTimer() {
            clearInterval(timerInterval);
            resetTimerUI();
            timeLeft = defaultDurationSeconds;
            updateDisplay();
            saveData();
        }

        function resetTimerUI() {
            isRunning = false;
            isPaused = false;
            startBtn.textContent = "بدء";
            startBtn.disabled = false;
            pauseBtn.disabled = true;
            stopBtn.disabled = true;
        }

        // --- Helper for Date & Time ---
        function getCurrentDateTimeString() {
            const now = new Date();
            const timeString = `${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}`;
            const dateString = `${now.getFullYear()}/${(now.getMonth()+1).toString().padStart(2, '0')}/${now.getDate().toString().padStart(2, '0')}`;
            return `${dateString} - ${timeString}`;
        }

        // --- Add Record to History ---
        function addRecord(pages, note = '') {
            historyData.push({
                round: roundCounter,
                date: getCurrentDateTimeString(),
                pages: pages,
                note: note
            });

            roundCounter++;
            updateHistoryTable();
            saveData();
        }

        // --- Modals & Events ---
        function showEndModal() {
            endModal.style.display = 'flex';
            pagesInput.value = '';
            pagesInput.focus();
        }

        // حفظ جولة من المؤقت التلقائي
        saveRoundBtn.addEventListener('click', () => {
            initAudio();
            const pages = pagesInput.value;
            if (pages === "" || pages < 0) {
                alert("الرجاء إدخال عدد صفحات صحيح.");
                return;
            }

            addRecord(pages);
            
            endModal.style.display = 'none';
            timeLeft = defaultDurationSeconds;
            updateDisplay();
            saveData();
        });

        // حفظ جولة يدوية من التبويب
        saveManualBtn.addEventListener('click', () => {
            const pages = manualPagesInput.value;
            if (pages === "" || pages < 0) {
                alert("الرجاء إدخال عدد صفحات صحيح.");
                return;
            }

            addRecord(pages, 'يدوي');
            
            manualPagesInput.value = '';
            
            // الانتقال لتبويب السجل لرؤية النتيجة
            document.querySelector('[data-tab="tab-history"]').click();
        });

        function updateHistoryTable() {
            historyTableBody.innerHTML = '';
            historyData.slice().reverse().forEach(entry => {
                const noteHtml = entry.note ? `<span class="tag-manual">${entry.note}</span>` : '';
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>الجولة ${entry.round}</td>
                    <td dir="ltr">${entry.date}</td>
                    <td>${entry.pages} ${noteHtml}</td>
                `;
                historyTableBody.appendChild(row);
            });
        }

        // --- Base Events ---
        startBtn.addEventListener('click', () => startTimer(false));
        pauseBtn.addEventListener('click', pauseTimer);
        stopBtn.addEventListener('click', stopTimer);

        openSettingsBtn.addEventListener('click', () => {
            settingsModal.style.display = 'flex';
        });

        closeSettingsBtn.addEventListener('click', () => {
            settingsModal.style.display = 'none';
            
            const newMins = parseInt(durationInput.value);
            if (newMins > 0 && !isRunning && !isPaused) {
                defaultDurationSeconds = newMins * 60;
                timeLeft = defaultDurationSeconds;
                updateDisplay();
                saveData();
            }
        });

        // Update App Force Refresh
        updateAppBtn.addEventListener('click', () => {
            saveData();
            const url = new URL(window.location.href);
            url.searchParams.set('v', new Date().getTime()); 
            window.location.href = url.toString();
        });

        window.addEventListener('click', (e) => {
            if (e.target === settingsModal) closeSettingsBtn.click();
        });

        // Initialize on Load
        window.addEventListener('DOMContentLoaded', loadData);

    </script>
</body>
</html>
