<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تتبع الإنجاز الدراسي الذكية</title>
    <style>
        :root {
            /* ألوان الوضع الفاتح (الافتراضي) */
            --bg-app: #fbf9f4;
            --surface: #ffffff;
            --text-primary: #2d251e;
            --text-secondary: #70655b;
            --accent-primary: #4a3e3d;
            --card-unstudied: #e07a5f;
            --card-studied: #81b29a;
            --border-subtle: #eae3da;
            --shadow-sm: 0 2px 8px rgba(45, 37, 30, 0.04);
            --shadow-md: 0 10px 30px rgba(45, 37, 30, 0.06);
            --radius-lg: 16px;
            --radius-md: 12px;
            --radius-sm: 8px;
            --header-bg: rgba(251, 249, 244, 0.92);
        }

        /* ألوان الوضع الداكن (مريحة للعين وموفرة للبطارية) */
        body.dark-mode {
            --bg-app: #121212; /* أسود عميق لبطارية الآيباد */
            --surface: #1e1e1e; /* رمادي داكن للبطاقات */
            --text-primary: #e0e0e0;
            --text-secondary: #a0a0a0;
            --accent-primary: #d4a373; /* لون دافئ متناسق مع الظلام */
            --card-unstudied: #8c4a38;
            --card-studied: #4a7c5f;
            --border-subtle: #333333;
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.5);
            --shadow-md: 0 10px 30px rgba(0, 0, 0, 0.6);
            --header-bg: rgba(18, 18, 18, 0.92);
        }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-app);
            color: var(--text-primary);
            margin: 0;
            padding: 0;
            line-height: 1.6;
            -webkit-tap-highlight-color: transparent;
            transition: background-color 0.4s ease, color 0.4s ease;
        }

        body.timer-ended {
            background-color: #d4edda;
        }
        body.dark-mode.timer-ended {
            background-color: #2e4f37; /* لون تنبيه مناسب للوضع الداكن */
        }

        .sticky-progress {
            position: sticky;
            top: 0;
            background: var(--header-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-subtle);
            padding: 12px 24px;
            z-index: 100;
            box-shadow: var(--shadow-sm);
            transition: background-color 0.4s ease, border-color 0.4s ease;
        }

        .progress-container {
            max-width: 900px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
        }

        .progress-bar-wrapper {
            flex-grow: 1;
            background: var(--border-subtle);
            height: 10px;
            border-radius: 20px;
            overflow: hidden;
            transition: background-color 0.4s ease;
        }

        .progress-bar-fill {
            background: var(--card-studied);
            height: 100%;
            width: 0%;
            transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1), background-color 0.4s ease;
        }

        .progress-text {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-secondary);
            min-width: 80px;
            text-align: left;
            transition: color 0.4s ease;
        }

        .main-layout {
            max-width: 900px;
            margin: 30px auto;
            padding: 0 20px;
            box-sizing: border-box;
        }

        .app-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .app-header h1 {
            font-size: 24px;
            font-weight: 700;
            margin: 0;
            color: var(--text-primary);
            transition: color 0.4s ease;
        }
        
        .header-actions {
            display: flex;
            gap: 10px;
        }

        .btn-theme, .btn-back {
            background: var(--surface);
            border: 1px solid var(--border-subtle);
            color: var(--text-primary);
            padding: 10px 18px;
            border-radius: var(--radius-md);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: var(--shadow-sm);
            transition: all 0.2s ease;
        }

        .btn-theme:hover, .btn-back:hover {
            transform: translateY(-1px);
            filter: brightness(0.95);
        }
        body.dark-mode .btn-theme:hover, body.dark-mode .btn-back:hover {
            filter: brightness(1.1);
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 35px;
        }

        @media (max-width: 768px) {
            .dashboard-grid { grid-template-columns: 1fr; }
        }

        .panel-card {
            background: var(--surface);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-lg);
            padding: 24px;
            box-shadow: var(--shadow-md);
            transition: background-color 0.4s ease, border-color 0.4s ease, box-shadow 0.4s ease;
        }

        .panel-title {
            font-size: 15px;
            font-weight: 600;
            text-transform: uppercase;
            color: var(--text-secondary);
            margin-top: 0;
            margin-bottom: 16px;
            letter-spacing: 0.5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: color 0.4s ease;
        }

        .inputs-group {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
        }

        .input-field {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .input-field label {
            font-size: 13px;
            color: var(--text-secondary);
            font-weight: 500;
            transition: color 0.4s ease;
        }

        .input-field input, .timer-input {
            background: var(--bg-app);
            border: 1px solid var(--border-subtle);
            padding: 12px;
            font-size: 16px;
            border-radius: var(--radius-sm);
            color: var(--text-primary);
            outline: none;
            transition: border 0.2s, background-color 0.4s ease, color 0.4s ease;
        }

        .input-field input:focus, .timer-input:focus {
            border-color: var(--accent-primary);
        }

        .action-buttons {
            display: flex;
            gap: 10px;
        }

        .btn-primary {
            flex: 2;
            background: var(--accent-primary);
            color: #ffffff; /* ثابت دائمًا أبيض ليكون مقروءاً */
            border: none;
            padding: 12px;
            border-radius: var(--radius-sm);
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s, background-color 0.4s ease;
        }

        .btn-primary:hover { opacity: 0.9; }

        .btn-secondary {
            flex: 1;
            background: transparent;
            border: 1px solid var(--card-unstudied);
            color: var(--card-unstudied);
            padding: 12px;
            border-radius: var(--radius-sm);
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.4s ease;
        }

        .timer-modes {
            display: flex;
            background: var(--bg-app);
            border-radius: var(--radius-sm);
            padding: 4px;
            margin-bottom: 15px;
            transition: background-color 0.4s ease;
        }

        .mode-btn {
            flex: 1;
            background: transparent;
            border: none;
            padding: 8px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s;
        }

        .mode-btn.active {
            background: var(--surface);
            color: var(--accent-primary);
            box-shadow: var(--shadow-sm);
        }

        .timer-setup {
            display: none;
            gap: 10px;
            margin-bottom: 15px;
        }

        .timer-setup.active {
            display: flex;
        }

        .timer-input {
            width: 100px;
            padding: 8px 12px;
        }

        .timer-display {
            font-size: 36px;
            font-weight: 300;
            font-family: -apple-system-monospace, monospace;
            text-align: center;
            margin: 10px 0 20px 0;
            letter-spacing: 1px;
            transition: color 0.3s;
        }

        .timer-display.ending {
            color: var(--card-unstudied);
            font-weight: bold;
        }

        .task-section {
            background: var(--surface);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-lg);
            padding: 24px;
            margin-bottom: 25px;
            box-shadow: var(--shadow-md);
            animation: fadeIn 0.4s ease;
            transition: background-color 0.4s ease, border-color 0.4s ease;
        }

        .task-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px dashed var(--border-subtle);
            padding-bottom: 12px;
            margin-bottom: 20px;
            transition: border-color 0.4s ease;
        }

        .task-title {
            font-size: 16px;
            font-weight: 700;
            color: var(--accent-primary);
            margin: 0;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: color 0.4s ease;
        }

        .task-badge {
            background: rgba(128, 128, 128, 0.1);
            color: var(--text-secondary);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
            transition: color 0.4s ease;
        }

        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(65px, 1fr));
            gap: 12px;
        }

        .card {
            background: var(--card-unstudied);
            color: #ffffff;
            height: 60px;
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            user-select: none;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: var(--shadow-sm);
        }

        .card:hover { transform: translateY(-3px); box-shadow: var(--shadow-md); }
        .card.studied { background: var(--card-studied); }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="sticky-progress">
    <div class="progress-container">
        <div class="progress-bar-wrapper">
            <div class="progress-bar-fill" id="progressBar"></div>
        </div>
        <div class="progress-text" id="progressText">تم إنجاز: 0%</div>
    </div>
</div>

<div class="main-layout">
    <div class="app-header">
        <h1>مساحة المتابعة الذكية ⚡</h1>
        <div class="header-actions">
            <button id="themeToggleBtn" class="btn-theme">🌙 داكن</button>
            <button class="btn-back" onclick="window.location.href='index.html'">الرجوع للرئيسية 🏠</button>
        </div>
    </div>

    <div class="dashboard-grid">
        <div class="panel-card">
            <p class="panel-title">إعدادات النطاق الدراسي</p>
            <div class="inputs-group">
                <div class="input-field">
                    <label for="startPage">من صفحة</label>
                    <input type="number" id="startPage" min="1" placeholder="مثال: 30">
                </div>
                <div class="input-field">
                    <label for="endPage">إلى صفحة</label>
                    <input type="number" id="endPage" min="1" placeholder="مثال: 40">
                </div>
            </div>
            <div class="action-buttons">
                <button class="btn-primary" id="generateBtn">إنشاء بطاقات المهام</button>
                <button class="btn-secondary" id="resetBtn">تصفير</button>
            </div>
        </div>

        <div class="panel-card" style="display: flex; flex-direction: column; justify-content: space-between;">
            <p class="panel-title">مؤقت التركيز الفعال</p>
            
            <div class="timer-modes">
                <button class="mode-btn active" id="modeUpBtn">تصاعدي (مفتوح)</button>
                <button class="mode-btn" id="modeDownBtn">تنازلي (تحديد وقت)</button>
            </div>

            <div class="timer-setup" id="timerSetup">
                <input type="number" id="setMinutes" class="timer-input" min="1" placeholder="دقائق (مثلاً 25)">
                <button class="btn-primary" id="applyTimerBtn" style="flex: 1; padding: 8px;">ضبط الوقت</button>
            </div>

            <div class="timer-display" id="timer">00:00:00</div>
            
            <div class="action-buttons">
                <button class="btn-primary" id="startTimerBtn" style="background:#5e504f;">بدء ▶</button>
                <button class="btn-primary" id="pauseTimerBtn" style="background:#7a6c6b;">إيقاف ⏸</button>
                <button class="btn-secondary" id="resetTimerBtn">إعادة</button>
            </div>
        </div>
    </div>

    <div id="workspace"></div>
</div>

<script>
    // --- نظام الوضع الداكن والفاتح ---
    const themeToggleBtn = document.getElementById('themeToggleBtn');
    const body = document.body;

    // استرجاع الإعداد المحفوظ مسبقاً إذا كان موجوداً
    if (localStorage.getItem('studyTrackerTheme') === 'dark') {
        body.classList.add('dark-mode');
        themeToggleBtn.innerHTML = '☀️ فاتح';
    }

    // التبديل بين الوضعين وحفظ الخيار
    themeToggleBtn.addEventListener('click', () => {
        body.classList.toggle('dark-mode');
        if (body.classList.contains('dark-mode')) {
            localStorage.setItem('studyTrackerTheme', 'dark');
            themeToggleBtn.innerHTML = '☀️ فاتح';
        } else {
            localStorage.setItem('studyTrackerTheme', 'light');
            themeToggleBtn.innerHTML = '🌙 داكن';
        }
    });

    // --- متغيرات البطاقات ---
    const startPageInput = document.getElementById('startPage');
    const endPageInput = document.getElementById('endPage');
    const generateBtn = document.getElementById('generateBtn');
    const resetBtn = document.getElementById('resetBtn');
    const workspace = document.getElementById('workspace');
    const progressBar = document.getElementById('progressBar');
    const progressText = document.getElementById('progressText');

    // --- متغيرات المؤقت ---
    let timerInterval;
    let seconds = 0;
    let isRunning = false;
    let isCountdown = false;
    let startingSeconds = 0;

    const timerDisplay = document.getElementById('timer');
    const startTimerBtn = document.getElementById('startTimerBtn');
    const pauseTimerBtn = document.getElementById('pauseTimerBtn');
    const resetTimerBtn = document.getElementById('resetTimerBtn');
    
    const modeUpBtn = document.getElementById('modeUpBtn');
    const modeDownBtn = document.getElementById('modeDownBtn');
    const timerSetup = document.getElementById('timerSetup');
    const setMinutesInput = document.getElementById('setMinutes');
    const applyTimerBtn = document.getElementById('applyTimerBtn');

    // --- وظائف البطاقات ---
    function generateWorkspace() {
        const start = parseInt(startPageInput.value);
        const end = parseInt(endPageInput.value);
        if (isNaN(start) || isNaN(end) || start <= 0 || end <= 0) {
            alert("يرجى إدخال أرقام صفحات صحيحة!"); return;
        }
        if (start > end) {
            alert("صفحة البداية لا يمكن أن تكون أكبر من صفحة النهاية!"); return;
        }
        workspace.innerHTML = '';
        let cardCount = 0;
        let currentTaskSection = null, currentGrid = null, taskIndex = 1;

        for (let i = start; i <= end; i++) {
            if (cardCount % 10 === 0) {
                currentTaskSection = document.createElement('div');
                currentTaskSection.className = 'task-section';
                
                const taskHeader = document.createElement('div');
                taskHeader.className = 'task-header';
                
                const taskTitle = document.createElement('h3');
                taskTitle.className = 'task-title';
                taskTitle.innerHTML = `🎯 المهمة الدراسية ${taskIndex}`;
                
                const taskBadge = document.createElement('span');
                taskBadge.className = 'task-badge';
                const taskEnd = Math.min(i + 9, end);
                taskBadge.textContent = `الصفحات: ${i} - ${taskEnd}`;
                
                taskHeader.appendChild(taskTitle);
                taskHeader.appendChild(taskBadge);
                currentTaskSection.appendChild(taskHeader);
                
                currentGrid = document.createElement('div');
                currentGrid.className = 'cards-grid';
                currentTaskSection.appendChild(currentGrid);
                workspace.appendChild(currentTaskSection);
                taskIndex++;
            }
            const card = document.createElement('div');
            card.className = 'card';
            card.textContent = i;
            card.addEventListener('click', function() {
                this.classList.toggle('studied');
                updateProgressBar();
            });
            currentGrid.appendChild(card);
            cardCount++;
        }
        updateProgressBar();
    }

    function updateProgressBar() {
        const totalCards = document.querySelectorAll('.card').length;
        const studiedCards = document.querySelectorAll('.card.studied').length;
        if (totalCards === 0) {
            progressBar.style.width = '0%'; progressText.textContent = 'تم إنجاز: 0%'; return;
        }
        const percentage = Math.round((studiedCards / totalCards) * 100);
        progressBar.style.width = `${percentage}%`;
        progressText.textContent = `تم إنجاز: ${percentage}%`;
    }

    function resetApp() {
        startPageInput.value = ''; endPageInput.value = ''; workspace.innerHTML = '';
        updateProgressBar(); resetTimer();
    }

    // --- وظائف المؤقت ---
    modeUpBtn.addEventListener('click', () => {
        isCountdown = false;
        modeUpBtn.classList.add('active');
        modeDownBtn.classList.remove('active');
        timerSetup.classList.remove('active');
        resetTimer();
    });

    modeDownBtn.addEventListener('click', () => {
        isCountdown = true;
        modeDownBtn.classList.add('active');
        modeUpBtn.classList.remove('active');
        timerSetup.classList.add('active');
        resetTimer();
    });

    applyTimerBtn.addEventListener('click', () => {
        const mins = parseInt(setMinutesInput.value);
        if (isNaN(mins) || mins <= 0) {
            alert("يرجى إدخال عدد دقائق صحيح!"); return;
        }
        startingSeconds = mins * 60;
        seconds = startingSeconds;
        updateTimerDisplay();
    });

    function playAudioAlert() {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const oscillator = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        oscillator.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        
        oscillator.type = 'sine';
        oscillator.frequency.setValueAtTime(880, audioCtx.currentTime);
        gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
        
        oscillator.start();
        setTimeout(() => oscillator.stop(), 500);
    }

    function updateTimerDisplay() {
        let h = Math.floor(seconds / 3600);
        let m = Math.floor((seconds % 3600) / 60);
        let s = seconds % 60;
        timerDisplay.textContent = 
            (h < 10 ? "0" + h : h) + ":" + 
            (m < 10 ? "0" + m : m) + ":" + 
            (s < 10 ? "0" + s : s);

        if (isCountdown && seconds > 0 && seconds <= 10) {
            timerDisplay.classList.add('ending');
        } else {
            timerDisplay.classList.remove('ending');
        }
    }

    function startTimer() {
        if (!isRunning) {
            if (isCountdown && seconds === 0) {
                alert("يرجى ضبط الوقت أولاً من خلال حقل الدقائق.");
                return;
            }
            
            document.body.classList.remove('timer-ended');
            isRunning = true;
            
            timerInterval = setInterval(() => {
                if (isCountdown) {
                    if (seconds > 0) {
                        seconds--;
                        updateTimerDisplay();
                    }
                    if (seconds === 0) {
                        pauseTimer();
                        playAudioAlert();
                        document.body.classList.add('timer-ended');
                        setTimeout(() => {
                            alert("⏰ انتهى الوقت المخصص لجلسة الدراسة! خذ استراحة قصيرة وواصل إنجازك.");
                            document.body.classList.remove('timer-ended');
                        }, 300);
                    }
                } else {
                    seconds++;
                    updateTimerDisplay();
                }
            }, 1000);
        }
    }

    function pauseTimer() {
        isRunning = false;
        clearInterval(timerInterval);
    }

    function resetTimer() {
        pauseTimer();
        document.body.classList.remove('timer-ended');
        timerDisplay.classList.remove('ending');
        if (isCountdown) {
            seconds = startingSeconds;
        } else {
            seconds = 0;
        }
        updateTimerDisplay();
    }

    generateBtn.addEventListener('click', generateWorkspace);
    resetBtn.addEventListener('click', resetApp);
    startTimerBtn.addEventListener('click', startTimer);
    pauseTimerBtn.addEventListener('click', pauseTimer);
    resetTimerBtn.addEventListener('click', resetTimer);
</script>
</body>
</html>
