<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المؤقت الذكي لدراسة المقررات</title>
    <style>
        /* الألوان العالمية */
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --primary-ring: rgba(79, 70, 229, 0.3);
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --bg: #f3f4f6;
            --surface: #ffffff;
            --border: #e5e7eb;
            --text-main: #1f2937;
            --text-muted: #6b7280;
        }

        /* إعادة ضبط الهوامش الأساسية */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }

        /* تعديل جذري: منع استخدام Flex على الـ Body لتجنب مشاكل الـ RTL */
        body {
            background-color: var(--bg);
            color: var(--text-main);
            padding: 80px 15px 40px 15px; 
            margin: 0;
            display: block; /* استخدام Block بدلاً من Flex */
            direction: rtl;
        }

        /* شريط التقدم العائم */
        #progressContainer {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 800px;
            height: 28px;
            background-color: #e5e7eb;
            z-index: 9999;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            border-radius: 14px;
            overflow: hidden;
            border: 2px solid var(--surface);
        }

        #progressBar {
            position: absolute;
            right: 0;
            top: 0;
            height: 100%;
            width: 0%;
            background-color: var(--success);
            transition: width 1s linear;
            z-index: 1;
        }

        #progressText {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #111827;
            font-size: 1rem;
            font-weight: 800;
            z-index: 2;
            text-shadow: -1px -1px 0 #fff, 1px -1px 0 #fff, -1px 1px 0 #fff, 1px 1px 0 #fff;
        }

        /* صندوق التطبيق المركزي المضمون 100% */
        .app-box {
            background-color: var(--surface);
            width: 100%;
            max-width: 750px;
            margin: 0 auto; /* التوسيط الكلاسيكي المضمون */
            border-radius: 20px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            padding: 30px;
            display: block; /* صندوق صلب */
        }

        .app-box h1 { 
            text-align: center; 
            margin-bottom: 25px; 
            font-size: 1.8rem; 
            color: var(--text-main); 
            font-weight: 800; 
        }

        /* نظام البطاقات المبسط والمستقر */
        .panel { 
            background: var(--surface); 
            padding: 20px; 
            border-radius: 16px; 
            border: 1px solid var(--border);
            margin-bottom: 20px; /* مسافة سفلية بدلاً من Grid Gap */
            display: block;
        }
        
        .panel-blue { border-top: 5px solid var(--primary); }
        .panel-green { border-top: 5px solid var(--success); }
        .panel-orange { border-top: 5px solid var(--warning); }

        .panel h3 { font-size: 1.1rem; margin-bottom: 15px; color: var(--text-main); font-weight: 700; }

        /* ترتيب الحقول (Row and Column) */
        .form-row { 
            display: flex; 
            flex-direction: row; 
            flex-wrap: wrap; 
            gap: 15px; 
            align-items: flex-start; 
        }

        .form-group { 
            flex: 1; 
            min-width: 130px; 
            display: flex; 
            flex-direction: column; 
        }

        .form-group label { 
            font-size: 0.85rem; 
            margin-bottom: 8px; 
            font-weight: 600; 
            color: var(--text-muted); 
        }
        
        input[type="number"]::-webkit-inner-spin-button, 
        input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        input[type="number"] { -moz-appearance: textfield; }

        .form-control { 
            padding: 12px 14px; 
            border: 1px solid var(--border); 
            border-radius: 10px; 
            font-size: 1rem; 
            outline: none; 
            background: #f9fafb; 
            text-align: right;
            color: var(--text-main);
            font-weight: 500;
            width: 100%;
        }

        .form-control:focus {
            background: var(--surface);
            border-color: var(--primary);
            box-shadow: 0 0 0 4px var(--primary-ring);
        }

        .dynamic-panel { 
            margin-top: 15px; 
            padding-top: 15px; 
            border-top: 1px dashed var(--border); 
        }

        /* عداد الساعة المخصص */
        .clock-container { 
            display: flex; 
            flex-direction: row;
            align-items: center; 
            justify-content: center; 
            background: #f9fafb; 
            padding: 12px; 
            border-radius: 10px; 
            border: 1px solid var(--border); 
            gap: 15px; 
            width: 100%; 
        }
        .clock-col { display: flex; flex-direction: column; align-items: center; gap: 5px; }
        .clock-btn { background: var(--surface); border: 1px solid var(--border); color: var(--text-muted); cursor: pointer; padding: 6px 15px; border-radius: 8px; }
        .clock-btn:hover { background: #e5e7eb; color: var(--text-main); }
        .clock-input { width: 55px; text-align: center; font-size: 1.8rem; font-weight: 800; border: none; outline: none; background: transparent; color: var(--text-main); pointer-events: none; }
        .clock-sep { font-size: 2rem; font-weight: bold; color: var(--text-muted); margin-bottom: 20px; }
        .clock-lbl { font-size: 0.75rem; color: var(--text-muted); font-weight: 700; }

        /* شاشة العرض */
        .screen-box { 
            width: 100%; 
            text-align: center; 
            padding: 30px 20px; 
            background: #f8fafc; 
            border-radius: 16px; 
            border: 2px dashed #cbd5e1; 
            margin-bottom: 25px;
        }
        .timer-text { font-size: 5rem; font-weight: 800; font-variant-numeric: tabular-nums; color: var(--text-main); margin: 10px 0; line-height: 1; }
        
        .badge { display: inline-block; padding: 8px 24px; border-radius: 30px; font-weight: bold; font-size: 1.1rem; }
        .bg-blue { background-color: #e0e7ff; color: var(--primary); }
        .bg-green { background-color: #d1fae5; color: var(--success); }
        .bg-orange { background-color: #fef3c7; color: #b45309; }

        /* الأزرار */
        .btn-group { display: flex; flex-direction: row; gap: 15px; justify-content: center; flex-wrap: wrap; width: 100%; }
        .btn { 
            padding: 14px 28px; 
            border: none; 
            border-radius: 10px; 
            font-size: 1.1rem; 
            font-weight: 700; 
            color: white; 
            cursor: pointer; 
            min-width: 130px; 
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; box-shadow: none; }
        
        .btn-primary { background-color: var(--primary); }
        .btn-warning { background-color: var(--warning); color: #000; }
        .btn-danger { background-color: var(--danger); }

        .info-text { text-align: center; font-size: 0.95rem; color: var(--text-muted); margin-top: 15px; font-weight: 600; }

        @media (max-width: 600px) {
            .form-row { flex-direction: column; }
            .form-group { width: 100%; }
            .timer-text { font-size: 4rem; } 
            .app-box { padding: 20px; border-radius: 0; box-shadow: none; } 
            body { padding: 70px 0 0 0; background-color: var(--surface); }
            .btn { width: 100%; } 
            #progressContainer { width: 95%; top: 15px; }
        }
    </style>
</head>
<body>

    <div id="progressContainer">
        <div id="progressBar"></div>
        <div id="progressText">0%</div>
    </div>

    <!-- الحاوية المعزولة بنظام Block -->
    <div class="app-box">
        <h1>مؤقت الدراسة الذكي</h1>
        
        <div id="settingsArea">
            
            <div class="panel panel-blue">
                <h3>📖 إعدادات الصفحات والوقت</h3>
                <div class="form-row">
                    <div class="form-group" style="flex: 1;">
                        <label>عدد الصفحات</label>
                        <input type="number" id="totalPages" class="form-control" value="100" min="1">
                    </div>
                    <div class="form-group" style="flex: 2;">
                        <label style="text-align: center;">وقت دراسة كل صفحة</label>
                        <div class="clock-container">
                            <div class="clock-col">
                                <button class="clock-btn" onclick="adjustClock('pageMins', 1)">▲</button>
                                <input type="number" id="pageMins" class="clock-input" value="1" readonly>
                                <button class="clock-btn" onclick="adjustClock('pageMins', -1)">▼</button>
                                <span class="clock-lbl">دقائق</span>
                            </div>
                            <div class="clock-sep">:</div>
                            <div class="clock-col">
                                <button class="clock-btn" onclick="adjustClock('pageSecs', 1)">▲</button>
                                <input type="number" id="pageSecs" class="clock-input" value="30" readonly>
                                <button class="clock-btn" onclick="adjustClock('pageSecs', -1)">▼</button>
                                <span class="clock-lbl">ثواني</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="panel panel-green">
                <h3>⚡ الاستراحة بين كل صفحة وصفحة</h3>
                <div class="form-row">
                    <div class="form-group">
                        <label>ثواني الاستراحة القصيرة</label>
                        <input type="number" id="shortRestSecs" class="form-control" value="10" min="0" style="text-align: center;">
                    </div>
                </div>
            </div>

            <div class="panel panel-orange">
                <h3>☕ الاستراحة المطولة التلقائية</h3>
                <div class="form-group">
                    <label>متى تريد الاستراحة المطولة؟</label>
                    <select id="triggerType" class="form-control" onchange="toggleLongRestUI()">
                        <option value="time">بحساب الوقت الكلي (استراحات + دراسة)</option>
                        <option value="pages">بعد عدد معين من الصفحات</option>
                        <option value="none">لا أريد استراحة مطولة</option>
                    </select>
                </div>

                <div id="ui-time" class="dynamic-panel">
                    <div class="form-row">
                        <div class="form-group">
                            <label>كل كم دقيقة؟</label>
                            <input type="number" id="triggerTimeValue" class="form-control" value="30" min="1">
                        </div>
                        <div class="form-group">
                            <label>مدة الاستراحة (دقائق)</label>
                            <input type="number" id="longRestMinsTime" class="form-control" value="5" min="1">
                        </div>
                    </div>
                </div>

                <div id="ui-pages" class="dynamic-panel" style="display: none;">
                    <div class="form-row">
                        <div class="form-group">
                            <label>كل كم صفحة؟</label>
                            <input type="number" id="triggerPagesValue" class="form-control" value="10" min="1">
                        </div>
                        <div class="form-group">
                            <label>مدة الاستراحة (دقائق)</label>
                            <input type="number" id="longRestMinsPage" class="form-control" value="5" min="1">
                        </div>
                    </div>
                </div>
            </div>
            
        </div>

        <div class="screen-box">
            <div class="badge bg-blue" id="statusBadge">في انتظار برمجة الخطة...</div>
            <div class="timer-text" id="timeDisplay">00:00</div>
            <div id="roundCounter" style="font-size: 1.2rem; font-weight: bold; margin-top: 10px; color: var(--text-muted);">الصفحة: 0 / 0</div>
            <div class="info-text" id="planInfo"></div>
        </div>

        <div class="btn-group">
            <button class="btn btn-primary" id="startBtn" onclick="initPlanAndStart()">برمجة الخطة والبدء</button>
            <button class="btn btn-warning" id="pauseBtn" onclick="pauseTimer()" disabled>إيقاف مؤقت</button>
            <button class="btn btn-danger" id="resetBtn" onclick="resetTimer()" disabled>إلغاء الخطة</button>
        </div>
    </div>

    <script>
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        const audioCtx = new AudioContext();

        let sessionPlan = [];
        let currentStepIndex = 0;
        let timeLeft = 0;
        let timer;
        let isRunning = false;
        let totalSessionSeconds = 0;
        let elapsedSessionSeconds = 0;

        const timeDisplay = document.getElementById('timeDisplay');
        const statusBadge = document.getElementById('statusBadge');
        const roundCounter = document.getElementById('roundCounter');
        const planInfo = document.getElementById('planInfo');
        const progressBar = document.getElementById('progressBar');
        const progressText = document.getElementById('progressText');
        const settingsArea = document.getElementById('settingsArea');
        
        const startBtn = document.getElementById('startBtn');
        const pauseBtn = document.getElementById('pauseBtn');
        const resetBtn = document.getElementById('resetBtn');

        function toggleLongRestUI() {
            const type = document.getElementById('triggerType').value;
            document.getElementById('ui-time').style.display = (type === 'time') ? 'block' : 'none';
            document.getElementById('ui-pages').style.display = (type === 'pages') ? 'block' : 'none';
        }

        function adjustClock(elementId, change) {
            const el = document.getElementById(elementId);
            let val = parseInt(el.value);
            val += change;
            if (elementId.includes('Secs')) {
                if (val > 59) val = 0;
                if (val < 0) val = 59;
            } else {
                if (val < 0) val = 0;
            }
            el.value = val.toString().padStart(2, '0');
        }

        window.addEventListener('DOMContentLoaded', () => {
            document.getElementById('pageMins').value = document.getElementById('pageMins').value.padStart(2, '0');
            document.getElementById('pageSecs').value = document.getElementById('pageSecs').value.padStart(2, '0');
        });

        function speakText(text) {
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'en-US';
            window.speechSynthesis.speak(utterance);
        }

        function playTick() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.type = 'sine';
            osc.frequency.setValueAtTime(1000, audioCtx.currentTime);
            gain.gain.setValueAtTime(1, audioCtx.currentTime);
            osc.start();
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
            osc.stop(audioCtx.currentTime + 0.1);
        }

        function formatTime(seconds) {
            const m = Math.floor(seconds / 60).toString().padStart(2, '0');
            const s = (seconds % 60).toString().padStart(2, '0');
            return `${m}:${s}`;
        }

        function buildSessionPlan() {
            sessionPlan = [];
            totalSessionSeconds = 0;
            elapsedSessionSeconds = 0;

            const totalPages = parseInt(document.getElementById('totalPages').value) || 1;
            const timePerPage = (parseInt(document.getElementById('pageMins').value) * 60) + parseInt(document.getElementById('pageSecs').value);
            const shortRestSecs = parseInt(document.getElementById('shortRestSecs').value) || 0;
            
            const triggerType = document.getElementById('triggerType').value;
            let triggerValue = 0;
            let longRestSecs = 0;

            if (triggerType === 'time') {
                triggerValue = parseInt(document.getElementById('triggerTimeValue').value) || 30;
                longRestSecs = parseInt(document.getElementById('longRestMinsTime').value) * 60;
            } else if (triggerType === 'pages') {
                triggerValue = parseInt(document.getElementById('triggerPagesValue').value) || 10;
                longRestSecs = parseInt(document.getElementById('longRestMinsPage').value) * 60;
            }

            let accumulatedTime = 0; 
            let accumulatedPages = 0;

            for (let i = 1; i <= totalPages; i++) {
                sessionPlan.push({ type: 'work', duration: timePerPage, pageNum: i });
                totalSessionSeconds += timePerPage;
                accumulatedTime += timePerPage;
                accumulatedPages += 1;

                if (i < totalPages) {
                    let needsLongRest = false;

                    if (triggerType === 'time' && accumulatedTime >= (triggerValue * 60)) {
                        needsLongRest = true;
                    } else if (triggerType === 'pages' && accumulatedPages >= triggerValue) {
                        needsLongRest = true;
                    }

                    if (triggerType !== 'none' && needsLongRest) {
                        sessionPlan.push({ type: 'longRest', duration: longRestSecs, pageNum: i });
                        totalSessionSeconds += longRestSecs;
                        accumulatedTime = 0; 
                        accumulatedPages = 0;
                    } else {
                        sessionPlan.push({ type: 'shortRest', duration: shortRestSecs, pageNum: i });
                        totalSessionSeconds += shortRestSecs;
                        accumulatedTime += shortRestSecs; 
                    }
                }
            }
            
            const estimatedTotalMins = Math.ceil(totalSessionSeconds / 60);
            planInfo.innerText = `الخطة مبرمجة! (${sessionPlan.length} مرحلة). الوقت الكلي المقدر: ${estimatedTotalMins} دقيقة.`;
        }

        function updateUI() {
            const currentStep = sessionPlan[currentStepIndex];
            timeDisplay.innerText = formatTime(timeLeft);
            
            const totalPages = document.getElementById('totalPages').value;
            roundCounter.innerText = `الصفحة: ${currentStep.pageNum} / ${totalPages}`;

            let progressPercent = (elapsedSessionSeconds / totalSessionSeconds) * 100;
            if (progressPercent > 100) progressPercent = 100;
            
            progressBar.style.width = `${progressPercent}%`;
            progressText.innerText = `${Math.floor(progressPercent)}%`;

            if (currentStep.type === 'work') {
                statusBadge.innerText = '📖 وقت الدراسة';
                statusBadge.className = 'badge bg-blue';
            } else if (currentStep.type === 'shortRest') {
                statusBadge.innerText = '⚡ استراحة قصيرة';
                statusBadge.className = 'badge bg-green';
            } else if (currentStep.type === 'longRest') {
                statusBadge.innerText = '☕ استراحة مطولة';
                statusBadge.className = 'badge bg-orange';
            }
        }

        function loadNextStep() {
            const previousStepType = sessionPlan[currentStepIndex].type;
            currentStepIndex++;

            if (currentStepIndex >= sessionPlan.length) {
                if (previousStepType === 'work') speakText('Stop');
                statusBadge.innerText = '🎉 اكتملت دراسة جميع الصفحات!';
                statusBadge.className = 'badge bg-blue';
                progressBar.style.width = '100%';
                progressText.innerText = '100%';
                resetState();
                return;
            }

            const nextStep = sessionPlan[currentStepIndex];
            timeLeft = nextStep.duration;
            
            if (previousStepType === 'work') {
                speakText('Stop');
            } else if (nextStep.type === 'work') {
                speakText('Start');
            }

            updateUI();
        }

        function timerTick() {
            if (timeLeft > 0) {
                const currentType = sessionPlan[currentStepIndex].type;
                if ((currentType === 'shortRest' || currentType === 'longRest') && timeLeft <= 3 && timeLeft > 0) {
                    playTick();
                }

                timeLeft--;
                elapsedSessionSeconds++;
                updateUI();
            } else {
                elapsedSessionSeconds++; 
                loadNextStep();
            }
        }

        function initPlanAndStart() {
            if (audioCtx.state === 'suspended') audioCtx.resume();

            if (sessionPlan.length === 0) {
                buildSessionPlan();
                currentStepIndex = 0;
                timeLeft = sessionPlan[0].duration;
                settingsArea.style.opacity = '0.5';
                settingsArea.style.pointerEvents = 'none';
                
                speakText('Start');
            }

            if (!isRunning) {
                timer = setInterval(timerTick, 1000);
                isRunning = true;
                
                startBtn.innerText = 'استئناف';
                startBtn.disabled = true;
                pauseBtn.disabled = false;
                resetBtn.disabled = false;
                updateUI();
            }
        }

        function pauseTimer() {
            if (isRunning) {
                clearInterval(timer);
                isRunning = false;
                speakText('Stop');
                
                startBtn.disabled = false;
                pauseBtn.disabled = true;
            }
        }

        function resetState() {
            clearInterval(timer);
            isRunning = false;
            startBtn.innerText = 'برمجة الخطة والبدء';
            startBtn.disabled = false;
            pauseBtn.disabled = true;
            resetBtn.disabled = true;
            settingsArea.style.opacity = '1';
            settingsArea.style.pointerEvents = 'auto';
            sessionPlan = [];
        }

        function resetTimer() {
            resetState();
            timeDisplay.innerText = '00:00';
            statusBadge.innerText = 'تم إلغاء الخطة.';
            roundCounter.innerText = 'الصفحة: 0 / 0';
            planInfo.innerText = '';
            progressBar.style.width = '0%';
            progressText.innerText = '0%';
            elapsedSessionSeconds = 0;
        }
    </script>
</body>
</html>
