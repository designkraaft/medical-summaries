<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اللغة الإنجليزية - الملخصات الطبية</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap');

        body {
            background-color: #f4ecd8; 
            color: #2c2c2c;
            font-family: 'Tajawal', sans-serif;
            margin: 0;
            padding: 40px 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            color: #5c4033;
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            color: #7a5c4d;
            font-size: 1.2em;
        }

        .back-btn-container {
            text-align: right;
            margin-bottom: 20px;
        }
        
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background-color: #e0d4c3;
            color: #4a3b2c;
            padding: 10px 20px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .back-btn:hover {
            background-color: #d1c1ab;
            color: #2c2c2c;
        }

        .section-title {
            color: #4a3b2c;
            font-size: 1.8em;
            margin: 40px 0 20px 0;
            border-bottom: 2px solid #e0d4c3;
            padding-bottom: 10px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .card {
            background-color: #eafaf1; /* لون موحد للكل */
            border: 1px solid #27ae60;
            border-radius: 12px;
            padding: 30px 20px;
            text-align: center;
            text-decoration: none;
            color: #1e8449;
            font-size: 1.4em;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            background-color: #d4f1e0;
            color: #145a32;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="back-btn-container">
            <a href="index.html" class="back-btn">
                <i class="fas fa-arrow-right"></i> العودة للرئيسية
            </a>
        </div>

        <div class="header">
            <h1>📚 اللغة الإنجليزية</h1>
            <p>اختر الوحدة للوصول إلى كلمات المنهج والترجمات</p>
        </div>

        <h2 class="section-title">الفصل الأول (إنجليزي 1)</h2>
        <div class="grid">
            <a href="Unit1.html" class="card">الوحدة الأولى</a>
            <a href="Unit2.html" class="card">الوحدة الثانية</a>
            <a href="Unit3.html" class="card">الوحدة الثالثة</a>
        </div>

        <h2 class="section-title">الفصل الثاني (إنجليزي 2)</h2>
        <div class="grid">
            <a href="Unit4.html" class="card">الوحدة الرابعة</a>
            <a href="Unit5.html" class="card">الوحدة الخامسة</a>
            <a href="Unit6.html" class="card">الوحدة السادسة</a>
        </div>

        <div style="text-align: center; margin-top: 60px; padding-top: 20px; border-top: 1px solid #e0d4c3;">
            <p style="color: #999; font-size: 1em;">مصمم خصيصاً لطلاب الطب | خلدون الحمدو - جامعة العلوم الصحية - 2026</p>
        </div>
    </div>

</body>
</html>
